<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Résultats</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f6f9; }
        .box { background: white; padding: 20px; border-radius: 8px; max-width: 800px; margin: 0 auto; text-align: center; }
        .score { font-size: 2em; color: #28a745; font-weight: bold; margin: 20px 0; }
        .res-card { text-align: left; padding: 10px; margin: 10px 0; border-radius: 4px; }
        .v { background: #d4edda; border-left: 5px solid #28a745; }
        .f { background: #f8d7da; border-left: 5px solid #dc3545; }
    </style>
</head>
<body>
    <div class="box">
        <h1>📊 Résultats de ton évaluation</h1>
        <p>Quiz : {{ quiz.title }}</p>
        <div class="score">Score final : {{ score }} / {{ total }}</div>
        
        <div style="margin-top: 35px;">
            {% for r in results %}
            <div class="res-card {% if r.is_right %}v{% else %}f{% endif %}">
                <p><strong>Question :</strong> {{ r.question }}</p>
                <p><strong>{% if r.is_right %}✅ Correct !{% else %}❌ Incorrect.{% endif %}</strong></p>
                <p>La bonne réponse était : <u>{{ r.correct_choice }}</u></p>
            </div>
            {% endfor %}
        </div>
        <br>
        <a href="{% url 'quiz_list' %}" style="color: #007bff; font-weight: bold; text-decoration: none;">🔄 Retour aux quizs</a>
    </div>
</body>
</html>
